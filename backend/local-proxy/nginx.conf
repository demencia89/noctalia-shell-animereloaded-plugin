limit_req_zone $binary_remote_addr zone=mal_auth_start:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=mal_auth_refresh:10m rate=60r/m;

server {
    listen 8443 ssl;
    listen [::]:8443 ssl;
    server_name dns.bogglemind.top;

    ssl_certificate /etc/letsencrypt/live/dns.bogglemind.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dns.bogglemind.top/privkey.pem;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_protocols TLSv1.2 TLSv1.3;

    location = /api/v1/mal/auth/start {
        limit_req zone=mal_auth_start burst=5 nodelay;
        proxy_pass http://127.0.0.1:18787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /api/v1/mal/auth/refresh {
        limit_req zone=mal_auth_refresh burst=15 nodelay;
        proxy_pass http://127.0.0.1:18787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
        proxy_pass http://127.0.0.1:18787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
